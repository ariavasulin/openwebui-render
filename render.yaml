services:
  - type: web
    name: open-webui
    runtime: image
    image:
      url: ghcr.io/open-webui/open-webui:v0.6.41
    plan: standard
    region: oregon
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        fromDatabase:
          name: openwebui-db
          property: connectionString
      - key: WEBUI_SECRET_KEY
        generateValue: true
      - key: ENABLE_SIGNUP
        value: "false"
      - key: ENABLE_OLLAMA_API
        value: "false"

databases:
  - name: openwebui-db
    databaseName: openwebui
    user: openwebui
    plan: free
    region: oregon
